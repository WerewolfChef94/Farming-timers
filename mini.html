<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Farming Timers — Mini</title>

  <meta name="alt1:name"        content="Farming Timers Mini" />
  <meta name="alt1:author"      content="WerewolfChef94" />
  <meta name="alt1:description" content="Compact farming timer overlay" />
  <meta name="alt1:version"     content="1.0.0" />
  <meta name="alt1:perm"        content="pixel gamestate overlay" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Pro:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:         #0a0f0b;
      --surface:    #101610;
      --border:     #1e2e1f;
      --accent:     #5aad5e;
      --accent-dim: #3a7a3d;
      --gold:       #c9a84c;
      --text:       #d4e8d0;
      --text-dim:   #6a8b6c;
      --warn:       #d4874a;
      --danger:     #c95252;
      --bar-bg:     #141e14;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Crimson Pro', Georgia, serif;
      overflow: hidden;
      /* Semi-transparent dark background so it sits nicely over RS */
      background: rgba(8, 13, 8, 0.92);
    }

    /* ── Header strip ─────────────────────────────────── */
    .mini-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 8px 3px;
      border-bottom: 1px solid var(--border);
      cursor: move;
      user-select: none;
    }

    .mini-title {
      font-family: 'Cinzel', serif;
      font-size: 9px;
      letter-spacing: 1.5px;
      color: var(--gold);
      text-shadow: 0 0 8px #c9a84c44;
    }

    .mini-status {
      font-size: 9px;
      color: var(--text-dim);
      font-style: italic;
    }

    /* ── Timer rows ───────────────────────────────────── */
    #timer-rows {
      display: flex;
      flex-direction: column;
    }

    .timer-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 8px 4px;
      border-bottom: 1px solid var(--border);
      position: relative;
      overflow: hidden;
      transition: background 0.3s;
    }

    .timer-row::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0; width: 2px;
      background: var(--accent-dim);
      transition: background 0.3s;
    }
    .timer-row.warning::before { background: var(--warn); }
    .timer-row.ready::before   { background: var(--accent); }
    .timer-row.ready { background: rgba(58, 122, 61, 0.08); }

    .row-icon { font-size: 13px; flex-shrink: 0; line-height: 1; }

    .row-info { flex: 1; min-width: 0; }

    .row-name {
      font-family: 'Cinzel', serif;
      font-size: 9px;
      color: var(--gold);
      letter-spacing: 0.5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Progress bar */
    .row-bar {
      height: 3px;
      background: var(--bar-bg);
      border-radius: 99px;
      overflow: hidden;
      margin-top: 3px;
    }
    .row-bar-fill {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, var(--accent-dim), var(--accent));
      transition: width 1s linear, background 1s;
    }
    .row-bar-fill.warning { background: linear-gradient(90deg, #8a4020, var(--warn)); }
    .row-bar-fill.ready   { background: linear-gradient(90deg, #3a7a3d, var(--accent)); animation: pulseGreen 1.5s infinite; }
    @keyframes pulseGreen { 0%,100%{opacity:1} 50%{opacity:0.5} }

    .row-time {
      font-size: 11px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      color: var(--text);
      flex-shrink: 0;
      text-align: right;
      min-width: 52px;
    }
    .row-time.warning { color: var(--warn); }
    .row-time.ready   { color: var(--accent); }

    /* ── Empty / idle state ───────────────────────────── */
    .idle-msg {
      padding: 10px 8px;
      font-size: 10px;
      color: var(--text-dim);
      font-style: italic;
      text-align: center;
    }

    /* ── No scrollbar ─────────────────────────────────── */
    ::-webkit-scrollbar { display: none; }
  </style>
</head>
<body>

  <div class="mini-header">
    <div class="mini-title">🌱 FARMING</div>
    <div class="mini-status" id="mini-status">No run active</div>
  </div>

  <div id="timer-rows"></div>

  <script>
  // ═══════════════════════════════════════════════
  //  Patch definitions — icons + names only
  // ═══════════════════════════════════════════════
  const PATCH_META = {
    herb:     { icon: '🌿', name: 'Herb'      },
    mushroom: { icon: '🍄', name: 'Mushroom'  },
    tree:     { icon: '🌳', name: 'Tree'      },
    fruit:    { icon: '🍎', name: 'Fruit Tree'},
    bush:     { icon: '🫐', name: 'Bush'      }
  };

  // ═══════════════════════════════════════════════
  //  Register with Alt1
  // ═══════════════════════════════════════════════
  if (window.alt1) {
    alt1.identifyAppUrl("https://werewolfchef94.github.io/Farming-timers/mini.html");
  }

  // ═══════════════════════════════════════════════
  //  Read shared state from localStorage
  //  (written by the main app)
  // ═══════════════════════════════════════════════
  function loadTimers() {
    try { return JSON.parse(localStorage.getItem('rs3_tm4') || '{}'); } catch { return {}; }
  }
  function loadRunning() {
    return localStorage.getItem('rs3_running4') === 'true';
  }

  // ═══════════════════════════════════════════════
  //  HELPERS
  // ═══════════════════════════════════════════════
  function formatMs(ms) {
    if (ms <= 0) return 'Ready!';
    const s   = Math.ceil(ms / 1000);
    const h   = Math.floor(s / 3600);
    const m   = Math.floor((s % 3600) / 60);
    const sec = s % 60;
    if (h > 0) return h + 'h ' + m + 'm';
    if (m > 0) return m + 'm ' + sec + 's';
    return sec + 's';
  }

  function getState(remaining, duration) {
    if (remaining <= 0) return 'ready';
    if (remaining / duration < 0.10) return 'warning';
    return 'growing';
  }

  // ═══════════════════════════════════════════════
  //  RENDER
  // ═══════════════════════════════════════════════
  function render() {
    const running = loadRunning();
    const timers  = loadTimers();
    const rows    = document.getElementById('timer-rows');
    const status  = document.getElementById('mini-status');

    const activeIds = Object.keys(timers);

    if (!running || activeIds.length === 0) {
      status.textContent = 'No run active';
      rows.innerHTML = '<div class="idle-msg">Start a run in the<br>main Farming Timers app</div>';
      return;
    }

    // Count ready patches for status
    const readyCount = activeIds.filter(id => {
      const t = timers[id];
      return (t.durationMs - (Date.now() - t.plantedAt)) <= 0;
    }).length;

    status.textContent = readyCount > 0
      ? readyCount + ' ready to harvest!'
      : activeIds.length + ' patch' + (activeIds.length > 1 ? 'es' : '') + ' growing';

    rows.innerHTML = activeIds.map(id => {
      const timer     = timers[id];
      const meta      = PATCH_META[id] || { icon: '🌱', name: id };
      const elapsed   = Date.now() - timer.plantedAt;
      const remaining = timer.durationMs - elapsed;
      const pct       = Math.max(0, Math.min(100, (elapsed / timer.durationMs) * 100));
      const state     = getState(remaining, timer.durationMs);
      const timeLabel = remaining <= 0 ? '✔ Ready!' : formatMs(remaining);

      return `
        <div class="timer-row ${state}" id="mrow-${id}">
          <div class="row-icon">${meta.icon}</div>
          <div class="row-info">
            <div class="row-name">${meta.name} <span style="color:var(--text-dim);font-family:'Crimson Pro',serif;font-size:9px;font-weight:300">${timer.cropName}</span></div>
            <div class="row-bar">
              <div class="row-bar-fill ${state}" id="mbar-${id}" style="width:${pct}%"></div>
            </div>
          </div>
          <div class="row-time ${state}" id="mtime-${id}">${timeLabel}</div>
        </div>`;
    }).join('');
  }

  // ═══════════════════════════════════════════════
  //  TICK — update in place every second
  // ═══════════════════════════════════════════════
  function tick() {
    const running = loadRunning();
    const timers  = loadTimers();
    const status  = document.getElementById('mini-status');

    if (!running || Object.keys(timers).length === 0) {
      // Only do full re-render if we were previously showing timers
      if (document.getElementById('timer-rows').querySelector('.timer-row')) {
        render();
      }
      return;
    }

    let readyCount = 0;
    let needsRerender = false;

    Object.keys(timers).forEach(id => {
      const timer     = timers[id];
      const elapsed   = Date.now() - timer.plantedAt;
      const remaining = timer.durationMs - elapsed;
      const pct       = Math.max(0, Math.min(100, (elapsed / timer.durationMs) * 100));
      const state     = getState(remaining, timer.durationMs);
      if (remaining <= 0) readyCount++;

      const timeEl = document.getElementById('mtime-' + id);
      const barEl  = document.getElementById('mbar-'  + id);
      const rowEl  = document.getElementById('mrow-'  + id);

      // If elements don't exist yet, need a full render
      if (!timeEl || !barEl || !rowEl) { needsRerender = true; return; }

      timeEl.textContent = remaining <= 0 ? '✔ Ready!' : formatMs(remaining);
      timeEl.className   = 'row-time ' + state;
      barEl.style.width  = pct + '%';
      barEl.className    = 'row-bar-fill ' + state;
      rowEl.className    = 'timer-row ' + state;
    });

    if (needsRerender) { render(); return; }

    const total = Object.keys(timers).length;
    status.textContent = readyCount > 0
      ? readyCount + ' ready to harvest!'
      : total + ' patch' + (total > 1 ? 'es' : '') + ' growing';
  }

  // ═══════════════════════════════════════════════
  //  BOOT
  // ═══════════════════════════════════════════════
  render();
  setInterval(tick, 1000);

  // Listen for storage changes from the main app
  // (fires when main app updates timers/running state)
  window.addEventListener('storage', e => {
    if (e.key === 'rs3_tm4' || e.key === 'rs3_running4') render();
  });
  </script>
</body>
</html>
